stages:
  - deploy

variables:
  DOCKER_IMAGE: "rust-learning-playground:1.86"
  CONCURRENCY: "4"
  TIMEOUT_SECONDS: "120"
  MEMORY_LIMIT_MB: "512"

# 仅 v* 标签触发
deploy-frontend:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
  script:
    - |
      if [[ ! "$CI_COMMIT_TAG" =~ ^v ]]; then
        echo "Tag $CI_COMMIT_TAG does not start with v, skipping frontend deploy."
        exit 0
      fi
    - sh scripts/deploy-frontend.sh
  only:
    - tags

deploy-backend:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
  script:
    - |
      if [[ ! "$CI_COMMIT_TAG" =~ ^v ]]; then
        echo "Tag $CI_COMMIT_TAG does not start with v, skipping backend deploy."
        exit 0
      fi
    - sh scripts/deploy-backend.sh
  only:
    - tags
