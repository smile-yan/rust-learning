<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rust 学习之旅 · 封面</title>
<style>
  :root{
    --rust:#ce422b;
    --rust-bright:#f74c00;
    --cream:#fff8f0;
    --bg:#0f0d0c;
    --code-bg:#161b22;
    --muted:#9a8f80;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:system-ui,-apple-system,"PingFang SC","Segoe UI",sans-serif;
    background:
      radial-gradient(1200px 800px at 20% 20%, rgba(247,76,0,.18), transparent 60%),
      radial-gradient(900px 700px at 85% 80%, rgba(206,66,43,.16), transparent 60%),
      linear-gradient(160deg,#0f0d0c 0%, #1a1410 60%, #0f0d0c 100%);
    color:var(--cream);
    overflow:hidden;
    position:relative;
  }
  /* 背景动态层 */
  .bg-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
  .glow{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5}
  .gear{position:absolute;opacity:.09}
  .gear svg{display:block}
  .spin-cw{animation:spin 24s linear infinite}
  .spin-ccw{animation:spin 18s linear infinite reverse}
  @keyframes spin{to{transform:rotate(360deg)}}
  .particles{position:absolute;inset:0}
  .particle{position:absolute;bottom:-20px;border-radius:50%;background:rgba(247,76,0,.55);
    animation:rise linear infinite;filter:blur(.5px)}
  @keyframes rise{
    0%{transform:translateY(0) scale(1);opacity:0}
    10%{opacity:.6}
    100%{transform:translateY(-110vh) scale(.5);opacity:0}
  }
  .crab{position:absolute;font-size:60px;opacity:.92;
    filter:drop-shadow(0 8px 20px rgba(0,0,0,.45));animation:floaty 6s ease-in-out infinite}
  @keyframes floaty{50%{transform:translateY(-14px) rotate(-4deg)}}

  /* 主舞台 */
  .stage{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:36px 20px;gap:18px}
  .badge{display:inline-flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px 8px;padding:6px 14px;border-radius:999px;
    background:rgba(247,76,0,.12);border:1px solid rgba(247,76,0,.4);color:#ffb89a;
    font-size:13px;letter-spacing:.02em;backdrop-filter:blur(6px)}
  .badge b{color:#fff}
  h1{font-size:clamp(40px,7vw,82px);font-weight:900;letter-spacing:-.02em;line-height:1.05;
    background:linear-gradient(120deg,#fff8f0,#ffb89a 40%,#f74c00 90%);
    -webkit-background-clip:text;background-clip:text;color:transparent;text-align:center}
  .subtitle{max-width:680px;text-align:center;color:#cbbda9;font-size:clamp(15px,1.8vw,19px);line-height:1.65}
  .subtitle b{color:#fff}

  /* 代码窗口 */
  .editor{width:min(620px,92vw);border-radius:12px;overflow:hidden;transform:translateY(4px);
    box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.06);background:var(--code-bg)}
  .editor-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#0d1117;
    border-bottom:1px solid rgba(255,255,255,.06)}
  .dot{width:12px;height:12px;border-radius:50%}
  .dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .filename{margin-left:8px;font-size:13px;color:#8b949e;font-family:"SF Mono",Menlo,monospace}
  .editor-body{display:flex;font-family:"SF Mono","Cascadia Code",Menlo,monospace;font-size:14px;line-height:1.6}
  .gutter{padding:16px 12px 16px 16px;text-align:right;color:#484f58;background:#0d1117;
    border-right:1px solid rgba(255,255,255,.05);user-select:none;min-width:34px}
  .gutter span{display:block}
  .code{padding:16px 18px;white-space:pre;overflow-x:auto;flex:1;min-width:0}
  .cursor{display:inline-block;width:9px;height:1.05em;background:#f74c00;
    vertical-align:-2px;animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}
  .tok-keyword{color:#ff7b72}
  .tok-string{color:#7ee787}
  .tok-comment{color:#8b949e;font-style:italic}
  .tok-number{color:#ffa657}
  .tok-type{color:#79c0ff}
  .tok-macro{color:#d2a8ff}

  /* 行动按钮 */
  .cta{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:4px}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:10px;
    font-size:15px;font-weight:700;text-decoration:none;transition:transform .15s,box-shadow .15s}
  .btn-primary{background:linear-gradient(120deg,#f74c00,#ce422b);color:#fff;
    box-shadow:0 10px 30px rgba(247,76,0,.4)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(247,76,0,.55)}
  .btn-ghost{background:rgba(255,255,255,.05);color:#fff8f0;border:1px solid rgba(255,255,255,.15)}
  .btn-ghost:hover{background:rgba(255,255,255,.1)}
  .btn svg{width:16px;height:16px;vertical-align:-3px;margin-right:6px;fill:currentColor}
  .stats{display:flex;flex-wrap:wrap;justify-content:center;gap:16px 28px;margin-top:12px;color:#9a8f80;font-size:13px}
  .stats b{color:#fff8f0;font-size:16px}
  .hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
    color:#7a6f60;font-size:12px;letter-spacing:.1em;animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{50%{transform:translate(-50%,6px)}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
  <div class="bg-layer">
    <div class="glow" style="width:480px;height:480px;background:#f74c00;top:-120px;left:-80px"></div>
    <div class="glow" style="width:420px;height:420px;background:#ce422b;bottom:-100px;right:-60px"></div>
    <div class="gear spin-cw" id="gear1" style="top:-70px;left:-50px"></div>
    <div class="gear spin-ccw" id="gear2" style="bottom:-80px;right:-40px"></div>
    <div class="gear spin-cw" id="gear3" style="top:26%;right:5%"></div>
    <div class="particles" id="particles"></div>
  </div>
  <div class="crab" style="top:13%;left:7%">🦀</div>

  <main class="stage">
    <span class="badge">🦀 内存安全 · 高性能 · 零成本抽象的系统级编程语言</span>
    <h1>Rust 学习宝典<br>从入门到超级 AI 开发</h1>
    <p class="subtitle">所有权、借用、生命周期、异步并发——<b>一次掌握</b>现代系统编程的核心思维。<br>编译器陪你写对每一行代码。</p>

    <div class="editor">
      <div class="editor-bar">
        <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
        <span class="filename">main.rs</span>
      </div>
      <div class="editor-body">
        <div class="gutter" id="gutter"></div>
        <code class="code" id="code"></code>
      </div>
    </div>

    <div class="cta">
      <a class="btn btn-primary" href="app.html">开始学习 →</a>
      <a class="btn btn-ghost" href="https://github.com/smile-yan/rust-learning" target="_blank" rel="noopener"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" /></svg>查看源码</a>
    </div>
    <div class="stats">
      <span><b>5</b> 大模块</span>
      <span><b>80+</b> 章节</span>
      <span><b>70+</b> 图解</span>
      <span><b>100+</b> 在线练习</span>
      <span><b>5</b> 项目源码分析</span>
    </div>
  </main>

<script>
// 待输入的 Rust 代码
const CODE = `fn main() {
    // 🦀 内存安全 · 零成本抽象 · 无 GC
    let nums = vec![1, 2, 3, 4, 5];
    let sum: i32 = nums.iter().sum();
    println!("sum = {sum}");
}`;

const KEYWORDS = new Set(['fn','let','mut','pub','struct','enum','impl','trait','use','match','if','else','for','while','loop','return','move','as','in','ref','const','static','type','where','async','await','crate','mod','self','Self','dyn','unsafe']);
const TYPES = new Set(['i32','i64','u32','u64','f32','f64','bool','char','String','str','Vec','Option','Result','Box','Rc','Arc','HashMap','HashSet']);

// 简易 Rust 词法分析：产出 {t:类型, v:文本} 序列
function tokenize(code){
  const toks=[];let i=0;
  while(i<code.length){
    const c=code[i];
    if(c==='/'&&code[i+1]==='/'){let j=i;while(j<code.length&&code[j]!=='\n')j++;toks.push({t:'comment',v:code.slice(i,j)});i=j;continue;}
    if(c==='"'){let j=i+1;while(j<code.length&&code[j]!=='"')j++;toks.push({t:'string',v:code.slice(i,j+1)});i=j+1;continue;}
    if(/\s/.test(c)){let j=i;while(j<code.length&&/\s/.test(code[j]))j++;toks.push({t:'plain',v:code.slice(i,j)});i=j;continue;}
    if(/[A-Za-z_]/.test(c)){let j=i;while(j<code.length&&/[A-Za-z0-9_]/.test(code[j]))j++;const w=code.slice(i,j);let type='plain';if(KEYWORDS.has(w))type='keyword';else if(TYPES.has(w))type='type';else if(code[j]==='!')type='macro';toks.push({t:type,v:w});i=j;continue;}
    if(/[0-9]/.test(c)){let j=i;while(j<code.length&&/[0-9._]/.test(code[j]))j++;toks.push({t:'number',v:code.slice(i,j)});i=j;continue;}
    toks.push({t:'plain',v:c});i++;
  }
  return toks;
}
const TOKENS=tokenize(CODE);
const TOTAL=CODE.length;
const code=document.getElementById('code');
const gutter=document.getElementById('gutter');

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// 渲染前 n 个字符（按 token 切分，保留语法高亮）
function render(n){
  let html='';let rem=n;
  for(const tk of TOKENS){
    if(rem<=0)break;
    const slice=tk.v.slice(0,rem);rem-=slice.length;
    html+= tk.t==='plain' ? esc(slice) : `<span class="tok-${tk.t}">${esc(slice)}</span>`;
  }
  code.innerHTML=html+'<span class="cursor"></span>';
}

// 行号
const lines=CODE.split('\n').length;
gutter.innerHTML=Array.from({length:lines},(_,i)=>`<span>${i+1}</span>`).join('');

// 打字循环：输入 → 停留 → 倒退删除 → 重来
let n=0, dir=1, hold=0;
function tick(){
  if(dir>0){ n++; if(n>=TOTAL){dir=0;hold=Date.now();} }
  else if(dir===0){ if(Date.now()-hold>2800){dir=-1;} }
  else { n--; if(n<=0){n=0;dir=1;} }
  render(Math.max(0,n));
  let delay;
  if(dir>0){ const ch=CODE[n-1]||''; delay=/[\s,;{}()]/.test(ch)?20:44; }
  else if(dir<0){ delay=14; }
  else { delay=60; }
  setTimeout(tick, delay);
}
render(0);
setTimeout(tick, 600);

// 上升粒子
const P=18;
let phtml='';
for(let i=0;i<P;i++){
  const s=2+Math.random()*5;
  const left=Math.random()*100;
  const dur=8+Math.random()*10;
  const delay=-Math.random()*dur;
  phtml+=`<span class="particle" style="left:${left}%;width:${s}px;height:${s}px;animation-duration:${dur}s;animation-delay:${delay}s"></span>`;
}
document.getElementById('particles').innerHTML=phtml;

// 生成齿轮 SVG
function makeGear(size,teeth,color){
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox','-50 -50 100 100');
  svg.setAttribute('width',size);svg.setAttribute('height',size);
  const g=document.createElementNS(NS,'g');g.setAttribute('fill',color);
  for(let i=0;i<teeth;i++){
    const r=document.createElementNS(NS,'rect');
    r.setAttribute('x','-5');r.setAttribute('y','-48');
    r.setAttribute('width','10');r.setAttribute('height','16');r.setAttribute('rx','2');
    r.setAttribute('transform',`rotate(${360/teeth*i})`);
    g.appendChild(r);
  }
  svg.appendChild(g);
  const body=document.createElementNS(NS,'circle');body.setAttribute('r','34');body.setAttribute('fill',color);svg.appendChild(body);
  const hole=document.createElementNS(NS,'circle');hole.setAttribute('r','13');hole.setAttribute('fill','#0f0d0c');svg.appendChild(hole);
  return svg;
}
document.getElementById('gear1').appendChild(makeGear(360,10,'#f74c00'));
document.getElementById('gear2').appendChild(makeGear(280,8,'#ce422b'));
document.getElementById('gear3').appendChild(makeGear(150,12,'#ffb89a'));
</script>
</body>
