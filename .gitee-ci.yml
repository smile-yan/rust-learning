stages:
  - deploy

variables:
  DOCKER_IMAGE: "rust-learning-playground:1.86"
  CONCURRENCY: "4"
  TIMEOUT_SECONDS: "120"
  MEMORY_LIMIT_MB: "512"

# 仅在 v* tag 时触发
workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
      when: always
    - when: never

deploy-frontend:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
  script:
    - sh scripts/deploy-frontend.sh
  only:
    - tags

deploy-backend:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
  script:
    - sh scripts/deploy-backend.sh
  only:
    - tags
