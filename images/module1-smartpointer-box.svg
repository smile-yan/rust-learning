<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">Box&lt;T&gt;：堆内存单所有权</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs><text x="160" y="70" font-size="15" font-weight="bold" fill="#3d3229" text-anchor="middle">栈 (Stack)</text><rect x="80" y="90" width="160" height="90" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/><text x="160" y="125" font-size="12" font-weight="normal" fill="#3d3229" text-anchor="middle">let b =</text><text x="160" y="150" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">Box&lt;T&gt;</text><line x1="240" y1="135" x2="300" y2="135" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/><text x="480" y="70" font-size="15" font-weight="bold" fill="#3d3229" text-anchor="middle">堆 (Heap)</text><rect x="360" y="90" width="240" height="90" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/><text x="480" y="125" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">实际数据 T</text><text x="480" y="150" font-size="12" font-weight="normal" fill="#666" text-anchor="middle">例如递归类型或大型对象</text><text x="320" y="230" font-size="14" font-weight="normal" fill="#5c4b37" text-anchor="middle">Box&lt;T&gt; 拥有堆数据，离开作用域时自动释放</text><text x="320" y="255" font-size="12" font-weight="normal" fill="#666" text-anchor="middle">适合：递归类型、 trait 对象、转移大值所有权</text>
</svg>