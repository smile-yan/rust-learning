<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">Box&lt;T&gt;：堆内存单所有权</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs>
  <rect x="40" y="56" width="560" height="236" fill="#fff3e0" stroke="#d4a76a" stroke-width="2" rx="8"/>
  <text x="320" y="84" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">栈上存指针，堆上存数据，单所有权自动释放</text>
  <!-- 栈 -->
  <text x="150" y="112" font-size="15" font-weight="bold" fill="#3d3229" text-anchor="middle">栈 (Stack)</text>
  <rect x="70" y="122" width="160" height="90" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/>
  <text x="150" y="157" font-size="12" fill="#3d3229" text-anchor="middle">let b =</text>
  <text x="150" y="182" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">Box&lt;T&gt;</text>
  <!-- 指针箭头 -->
  <line x1="230" y1="167" x2="370" y2="167" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="158" font-size="12" fill="#5c4b37" text-anchor="middle">指针</text>
  <!-- 堆 -->
  <text x="470" y="112" font-size="15" font-weight="bold" fill="#3d3229" text-anchor="middle">堆 (Heap)</text>
  <rect x="370" y="122" width="200" height="90" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="470" y="157" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">实际数据 T</text>
  <text x="470" y="182" font-size="12" fill="#666" text-anchor="middle">递归类型 / 大型对象</text>
  <!-- 底部说明 -->
  <text x="320" y="248" font-size="13" fill="#5c4b37" text-anchor="middle">Box&lt;T&gt; 拥有堆数据，离开作用域时自动释放</text>
  <text x="320" y="272" font-size="12" fill="#666" text-anchor="middle">适合：递归类型、trait 对象、转移大值所有权</text>
</svg>
