<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="470" viewBox="0 0 720 470">
  <defs>
    <style>
      .bg { fill: #fff8f0; }
      .card { fill: #ffffff; stroke: #e0d6cc; stroke-width: 2; }
      .title { font: bold 22px system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .text { font: 15px system-ui, -apple-system, sans-serif; fill: #2a2a2a; }
      .label { font: 13px system-ui, -apple-system, sans-serif; fill: #5a5a5a; }
      .lang { font: 14px system-ui, -apple-system, sans-serif; fill: #2a2a2a; }
      .value { font: 13px "SF Mono", Menlo, monospace; fill: #5a5a5a; }
      .bar { fill: #cfe4f7; stroke: #3399ff; stroke-width: 1.5; }
      .bar-rust { fill: #ffd9b3; stroke: #f97316; stroke-width: 2; }
      .break-line { stroke: #ffffff; stroke-width: 3; }
    </style>
  </defs>
  <rect width="720" height="470" class="bg"/>
  <rect x="16" y="16" width="688" height="438" rx="12" class="card"/>
  <text x="360" y="52" text-anchor="middle" class="title">不同语言执行速度对比（示意量级）</text>
  <text x="360" y="78" text-anchor="middle" class="label">相对执行时间：以 C 为 1×，越短越好</text>

  <!-- C -->
  <text x="110" y="124" text-anchor="end" class="lang">C</text>
  <rect x="120" y="105" width="55" height="28" rx="5" class="bar"/>
  <text x="183" y="124" class="value">≈1×</text>

  <!-- C++ -->
  <text x="110" y="170" text-anchor="end" class="lang">C++</text>
  <rect x="120" y="151" width="55" height="28" rx="5" class="bar"/>
  <text x="183" y="170" class="value">≈1×</text>

  <!-- Rust -->
  <text x="110" y="216" text-anchor="end" class="lang">Rust</text>
  <rect x="120" y="197" width="55" height="28" rx="5" class="bar-rust"/>
  <text x="183" y="216" class="value">≈1×</text>

  <!-- Go -->
  <text x="110" y="262" text-anchor="end" class="lang">Go</text>
  <rect x="120" y="243" width="110" height="28" rx="5" class="bar"/>
  <text x="238" y="262" class="value">≈2×</text>

  <!-- Java -->
  <text x="110" y="308" text-anchor="end" class="lang">Java</text>
  <rect x="120" y="289" width="165" height="28" rx="5" class="bar"/>
  <text x="293" y="308" class="value">≈2–3×</text>

  <!-- JavaScript -->
  <text x="110" y="354" text-anchor="end" class="lang">JavaScript</text>
  <rect x="120" y="335" width="330" height="28" rx="5" class="bar"/>
  <text x="458" y="354" class="value">≈3–8×</text>

  <!-- Python：数量级太大，条形用截断标记表示 -->
  <text x="110" y="400" text-anchor="end" class="lang">Python</text>
  <rect x="120" y="381" width="420" height="28" rx="5" class="bar"/>
  <line x1="505" y1="379" x2="519" y2="411" class="break-line"/>
  <line x1="517" y1="379" x2="531" y2="411" class="break-line"/>
  <text x="548" y="400" class="value">≈30–100×</text>

  <text x="360" y="440" text-anchor="middle" class="label">示意量级：综合 benchmarks-game 等公开基准的大致范围，具体倍数随任务与实现而变</text>
</svg>
