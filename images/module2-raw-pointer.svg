<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" width="560" height="340">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="560" height="340" fill="#fff8f0" rx="10"/>
  <text x="280" y="30" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">🦀 引用 vs 裸指针</text>
  <rect x="40" y="60" width="200" height="240" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" rx="8"/>
  <text x="140" y="90" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#0d47a1">&amp;T / &amp;mut T</text>
  <text x="140" y="120" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333">✅ 借用检查</text>
  <text x="140" y="145" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333">✅ 生命周期保证</text>
  <text x="140" y="170" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333">✅ 不可为空</text>
  <text x="140" y="205" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333">编译器担保有效</text>
  <rect x="320" y="60" width="200" height="240" fill="#fff3e0" stroke="#ef6c00" stroke-width="2" rx="8"/>
  <text x="420" y="90" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#e65100">*const T / *mut T</text>
  <text x="420" y="120" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333">⚠️ 无借用检查</text>
  <text x="420" y="145" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333">⚠️ 可为 null</text>
  <text x="420" y="170" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333">⚠️ 可指向无效内存</text>
  <text x="420" y="205" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333">需要 unsafe 块解引用</text>
  <line x1="240" y1="180" x2="312" y2="180" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="276" y="170" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#666">安全责任转移</text>
</svg>