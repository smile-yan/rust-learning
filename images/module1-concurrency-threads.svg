<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">并发：创建线程</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs>
  <rect x="40" y="56" width="560" height="270" fill="#fff3e0" stroke="#d4a76a" stroke-width="2" rx="8"/>
  <text x="320" y="84" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">std::thread::spawn 创建并发执行单元</text>
  <!-- 主线程框，居中 -->
  <rect x="220" y="100" width="200" height="70" fill="#fff3e0" stroke="#fb8c00" stroke-width="2" rx="8"/>
  <text x="320" y="130" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">主线程 (main)</text>
  <text x="320" y="152" font-size="12" fill="#666" text-anchor="middle">spawn(move || { ... })</text>
  <!-- 三条分叉箭头：从主线程底部到三个子线程顶部 -->
  <line x1="260" y1="170" x2="160" y2="220" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="170" x2="320" y2="220" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="170" x2="480" y2="220" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 三个子线程，关于 320 对称 -->
  <rect x="100" y="225" width="120" height="60" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="160" y="260" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">线程 A</text>
  <rect x="260" y="225" width="120" height="60" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/>
  <text x="320" y="260" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">线程 B</text>
  <rect x="420" y="225" width="120" height="60" fill="#f3e5f5" stroke="#ab47bc" stroke-width="2" rx="8"/>
  <text x="480" y="260" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">线程 C</text>
  <text x="320" y="315" font-size="13" fill="#5c4b37" text-anchor="middle">Rust 在线程创建时就检查数据所有权，防止数据竞争</text>
</svg>
