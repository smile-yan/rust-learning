<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">命令行参数解析 clap</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs>
  <rect x="40" y="55" width="560" height="250" fill="#fff3e0" stroke="#d4a76a" stroke-width="2" rx="8"/>
  <text x="320" y="85" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">CLI 程序参数流转</text>
  <rect x="70" y="110" width="160" height="55" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="150" y="138" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">用户输入</text>
  <text x="150" y="158" font-size="12" fill="#666" text-anchor="middle">myapp -n Alice -v</text>
  <line x1="230" y1="137" x2="270" y2="137" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="280" y="110" width="160" height="55" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/>
  <text x="360" y="138" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">clap Parser</text>
  <text x="360" y="158" font-size="12" fill="#666" text-anchor="middle">#[derive(Parser)]</text>
  <text x="360" y="172" font-size="12" fill="#666" text-anchor="middle">name / verbose / config</text>
  <line x1="440" y1="137" x2="480" y2="137" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="490" y="110" width="120" height="55" fill="#fce4ec" stroke="#ec407a" stroke-width="2" rx="8"/>
  <text x="550" y="138" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">类型安全</text>
  <text x="550" y="158" font-size="12" fill="#666" text-anchor="middle">Args { name, verbose }</text>
  <line x1="360" y1="165" x2="360" y2="210" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="220" y="215" width="280" height="60" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="360" y="240" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">自动生成 --help / 错误提示</text>
  <text x="360" y="260" font-size="12" fill="#666" text-anchor="middle">子命令 · 环境变量 · 默认值 · 验证</text>
  <text x="320" y="318" font-size="13" fill="#5c4b37" text-anchor="middle">声明式定义参数，编译期检查，运行期友好提示</text>
</svg>
