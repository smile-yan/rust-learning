<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">命令行参数解析 clap</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs>
  <rect x="40" y="56" width="640" height="310" fill="#fff3e0" stroke="#d4a76a" stroke-width="2" rx="8"/>
  <text x="360" y="86" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">CLI 程序参数流转</text>
  <!-- 第一行三框：用户输入 → clap Parser → 类型安全 -->
  <rect x="75" y="112" width="150" height="92" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="150" y="140" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">用户输入</text>
  <text x="150" y="162" font-size="12" fill="#666" text-anchor="middle">myapp -n Alice -v</text>
  <text x="150" y="184" font-size="12" fill="#666" text-anchor="middle">命令行字符串</text>
  <line x1="225" y1="158" x2="265" y2="158" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="270" y="112" width="180" height="92" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/>
  <text x="360" y="140" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">clap Parser</text>
  <text x="360" y="162" font-size="12" fill="#666" text-anchor="middle">#[derive(Parser)]</text>
  <text x="360" y="184" font-size="12" fill="#666" text-anchor="middle">name / verbose / config</text>
  <line x1="450" y1="158" x2="490" y2="158" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="495" y="112" width="150" height="92" fill="#fce4ec" stroke="#ec407a" stroke-width="2" rx="8"/>
  <text x="570" y="140" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">类型安全</text>
  <text x="570" y="162" font-size="12" fill="#666" text-anchor="middle">Args { name, verbose }</text>
  <text x="570" y="184" font-size="12" fill="#666" text-anchor="middle">编译期校验</text>
  <!-- 向下箭头到特性框 -->
  <line x1="360" y1="204" x2="360" y2="244" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 底部特性框 -->
  <rect x="220" y="248" width="280" height="66" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="360" y="274" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">自动生成 --help / 错误提示</text>
  <text x="360" y="296" font-size="12" fill="#666" text-anchor="middle">子命令 · 环境变量 · 默认值 · 验证</text>
  <!-- 底部注释 -->
  <text x="360" y="346" font-size="13" fill="#5c4b37" text-anchor="middle">声明式定义参数，编译期检查，运行期友好提示</text>
</svg>
