<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380">
  <defs>
    <style>
      .bg { fill: #fff8f0; }
      .card { fill: #ffffff; stroke: #e0d6cc; stroke-width: 2; }
      .title { font: bold 22px system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .text { font: 15px system-ui, -apple-system, sans-serif; fill: #2a2a2a; }
      .code { font: 14px "SF Mono", Menlo, monospace; fill: #3a2a1a; }
      .label { font: 13px system-ui, -apple-system, sans-serif; fill: #5a5a5a; }
      .arrow { stroke: #7a6a5a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .highlight { fill: #ffeacc; stroke: #ffaa55; stroke-width: 2; }
      .box { fill: #e8f4ff; stroke: #3399ff; stroke-width: 2; }
      .box2 { fill: #f0ffe8; stroke: #66bb33; stroke-width: 2; }
      .box3 { fill: #fff0f5; stroke: #dd5599; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#7a6a5a"/>
    </marker>
  </defs>
  <rect width="720" height="380" class="bg"/>
  <rect x="16" y="16" width="688" height="348" rx="12" class="card"/>
  <text x="360" y="50" text-anchor="middle" class="title">module0-functions</text>
  
  <rect x="60" y="80" width="600" height="100" rx="8" class="box"/>
  <text x="195.6" y="115" class="code">fn add(a: i32, b: i32) -&gt; i32 { a + b }</text>
  <text x="208.2" y="145" text-anchor="middle" class="label">fn 关键字</text>
  <text x="313.6" y="145" text-anchor="middle" class="label">参数列表</text>
  <text x="410.5" y="145" text-anchor="middle" class="label">返回类型</text>
  <text x="488.5" y="145" text-anchor="middle" class="label">函数体/表达式</text>
  <line x1="208.2" y1="120" x2="208.2" y2="135" class="arrow"/>
  <line x1="313.6" y1="120" x2="313.6" y2="135" class="arrow"/>
  <line x1="410.5" y1="120" x2="410.5" y2="135" class="arrow"/>
  <line x1="488.5" y1="120" x2="488.5" y2="135" class="arrow"/>
  
  <rect x="120" y="240" width="180" height="80" rx="8" class="box2"/>
  <text x="210" y="275" text-anchor="middle" class="text">调用方</text>
  <text x="210" y="300" text-anchor="middle" class="label">add(2, 3)</text>
  
  <rect x="420" y="240" width="180" height="80" rx="8" class="box3"/>
  <text x="510" y="275" text-anchor="middle" class="text">函数</text>
  <text x="510" y="300" text-anchor="middle" class="label">返回 5</text>
  
  <line x1="300" y1="272" x2="420" y2="272" class="arrow"/>
  <line x1="420" y1="288" x2="300" y2="288" class="arrow"/>

</svg>