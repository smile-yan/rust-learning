<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320">
  <defs>
    <style>
      .bg { fill: #fff8f0; }
      .card { fill: #ffffff; stroke: #e0d6cc; stroke-width: 2; }
      .title { font: bold 22px system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .text { font: 15px system-ui, -apple-system, sans-serif; fill: #2a2a2a; }
      .code { font: 14px "SF Mono", Menlo, monospace; fill: #3a2a1a; }
      .label { font: 13px system-ui, -apple-system, sans-serif; fill: #5a5a5a; }
      .arrow { stroke: #7a6a5a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .highlight { fill: #ffeacc; stroke: #ffaa55; stroke-width: 2; }
      .box { fill: #e8f4ff; stroke: #3399ff; stroke-width: 2; }
      .box2 { fill: #f0ffe8; stroke: #66bb33; stroke-width: 2; }
      .box3 { fill: #fff0f5; stroke: #dd5599; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a6a5a"/>
    </marker>
  </defs>
  <rect width="720" height="320" class="bg"/>
  <rect x="16" y="16" width="688" height="288" rx="12" class="card"/>
  <text x="360" y="50" text-anchor="middle" class="title">module0-collections</text>
  
  <rect x="50" y="80" width="190" height="120" rx="8" class="box"/>
  <text x="145" y="120" text-anchor="middle" class="text">Vec&lt;T&gt;</text>
  <text x="145" y="150" text-anchor="middle" class="label">可变长数组</text>
  <text x="145" y="180" text-anchor="middle" class="code">vec![1, 2, 3]</text>
  
  <rect x="265" y="80" width="190" height="120" rx="8" class="box2"/>
  <text x="360" y="120" text-anchor="middle" class="text">String</text>
  <text x="360" y="150" text-anchor="middle" class="label">UTF-8 可变字符串</text>
  <text x="360" y="180" text-anchor="middle" class="code">&quot;hello&quot;.to_string()</text>
  
  <rect x="480" y="80" width="190" height="120" rx="8" class="box3"/>
  <text x="575" y="120" text-anchor="middle" class="text">HashMap&lt;K,V&gt;</text>
  <text x="575" y="150" text-anchor="middle" class="label">键值对集合</text>
  <text x="575" y="180" text-anchor="middle" class="code">map.insert(k, v)</text>
  
  <text x="360" y="260" text-anchor="middle" class="text">💡 集合都存储在堆上，容量会自动增长</text>

</svg>