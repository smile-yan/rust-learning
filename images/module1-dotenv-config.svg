<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">环境变量与配置 dotenv / config</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs>
  <rect x="40" y="56" width="560" height="262" fill="#fff3e0" stroke="#d4a76a" stroke-width="2" rx="8"/>
  <text x="320" y="86" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">应用配置加载流程</text>
  <rect x="60" y="110" width="130" height="65" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="125" y="135" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">.env 文件</text>
  <text x="125" y="155" font-size="11" fill="#666" text-anchor="middle">DATABASE_URL=...</text>
  <text x="125" y="170" font-size="11" fill="#666" text-anchor="middle">PORT=8080</text>
  <line x1="190" y1="142" x2="230" y2="142" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="240" y="110" width="140" height="65" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/>
  <text x="310" y="135" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">dotenv::dotenv</text>
  <text x="310" y="155" font-size="12" fill="#666" text-anchor="middle">加载到 std::env</text>
  <text x="310" y="170" font-size="12" fill="#666" text-anchor="middle">优先级低于系统 env</text>
  <line x1="380" y1="142" x2="420" y2="142" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="430" y="110" width="150" height="65" fill="#fce4ec" stroke="#ec407a" stroke-width="2" rx="8"/>
  <text x="505" y="135" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">Config 结构体</text>
  <text x="505" y="155" font-size="12" fill="#666" text-anchor="middle">env::var("PORT")</text>
  <text x="505" y="170" font-size="12" fill="#666" text-anchor="middle">unwrap_or("8080")</text>
  <line x1="310" y1="175" x2="310" y2="215" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="170" y="220" width="280" height="50" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="310" y="243" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">config crate（可选）</text>
  <text x="310" y="263" font-size="12" fill="#666" text-anchor="middle">YAML / TOML / JSON 多层配置合并</text>
  <text x="320" y="298" font-size="13" fill="#5c4b37" text-anchor="middle">dotenv 隔离开发环境，config crate 管理多环境配置</text>
</svg>
