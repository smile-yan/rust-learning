<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" role="img" aria-label="所有权移动示意">
  <title>所有权移动示意</title>
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="360" y="34" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#3d2b1f">🦀 所有权移动示意</text>
  <rect x="40" y="60" width="180" height="200" fill="#e8f4e8" stroke="#4a7c59" stroke-width="2" rx="8"/>
  <text x="130" y="88" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#2f4f3f">栈 stack</text>
  <rect x="70" y="110" width="120" height="40" fill="#ffffff" stroke="#4a7c59" stroke-width="1.5" rx="4"/>
  <text x="130" y="135" text-anchor="middle" font-family="monospace" font-size="13" fill="#333">s1: String</text>
  <text x="130" y="166" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555">ptr / len / cap</text>

  <rect x="260" y="60" width="200" height="200" fill="#fff0e0" stroke="#c17817" stroke-width="2" rx="8"/>
  <text x="360" y="88" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#5c3d14">堆 heap</text>
  <rect x="290" y="110" width="140" height="50" fill="#ffffff" stroke="#c17817" stroke-width="1.5" rx="4"/>
  <text x="360" y="142" text-anchor="middle" font-family="monospace" font-size="13" fill="#333">&quot;hello&quot;</text>

  <path d="M 190 130 L 290 135" stroke="#d9534f" stroke-width="2.5" marker-end="url(#arrow-red)" fill="none"/>
  <text x="240" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#d9534f">指向</text>

  <rect x="500" y="60" width="180" height="200" fill="#e8f4e8" stroke="#4a7c59" stroke-width="2" rx="8"/>
  <text x="590" y="88" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#2f4f3f">移动后</text>
  <rect x="530" y="110" width="120" height="40" fill="#ffffff" stroke="#4a7c59" stroke-width="1.5" rx="4"/>
  <text x="590" y="135" text-anchor="middle" font-family="monospace" font-size="13" fill="#333">s2: String</text>
  <text x="590" y="166" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555">ptr / len / cap</text>
  <path d="M 650 135 L 710 135" stroke="#d9534f" stroke-width="2.5" marker-end="url(#arrow-red)" fill="none"/>
  <text x="695" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#d9534f">移动</text>

  <rect x="290" y="190" width="140" height="40" fill="#fff8f0" stroke="#d9534f" stroke-width="2" stroke-dasharray="5,3" rx="4"/>
  <text x="360" y="216" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#d9534f">s1 不再有效</text>

  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d9534f"/>
    </marker>
  </defs>
</svg>
