<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">生命周期：借用不能比拥有者活得更长</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs><text x="120" y="60" font-size="15" font-weight="bold" fill="#2e7d32" text-anchor="start">✅ 有效借用</text><rect x="70" y="85" width="240" height="70" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/><text x="190" y="115" font-size="12" font-weight="normal" fill="#3d3229" text-anchor="middle">let s = String::from("hello");</text><text x="190" y="145" font-size="11" font-weight="normal" fill="#666" text-anchor="middle">let r = &s; // 在 s 有效期间借用</text><line x1="190" y1="155" x2="190" y2="215" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/><rect x="70" y="220" width="240" height="50" fill="#c8e6c9" stroke="#66bb6a" stroke-width="2" rx="8"/><text x="190" y="250" font-size="12" font-weight="normal" fill="#3d3229" text-anchor="middle">println!("{}", r); // OK</text><text x="410" y="60" font-size="15" font-weight="bold" fill="#c62828" text-anchor="start">⚠️ 无效借用（悬垂引用）</text><rect x="360" y="85" width="240" height="110" fill="#ffebee" stroke="#ef5350" stroke-width="2" rx="8"/><text x="480" y="115" font-size="14" font-weight="normal" fill="#3d3229" text-anchor="middle">{</text><text x="480" y="140" font-size="11" font-weight="normal" fill="#3d3229" text-anchor="middle">  let s = String::from("hi");</text><text x="480" y="165" font-size="11" font-weight="normal" fill="#3d3229" text-anchor="middle">  let r = &s;</text><text x="480" y="190" font-size="11" font-weight="normal" fill="#3d3229" text-anchor="middle">} // s 在这里被释放</text><line x1="480" y1="195" x2="480" y2="250" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/><text x="480" y="270" font-size="11" font-weight="normal" fill="#c62828" text-anchor="middle">println!("{}", r); // 编译错误！</text>
</svg>