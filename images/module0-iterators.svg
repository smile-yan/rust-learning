<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320">
  <defs>
    <style>
      .bg { fill: #fff8f0; }
      .card { fill: #ffffff; stroke: #e0d6cc; stroke-width: 2; }
      .title { font: bold 22px system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .text { font: 15px system-ui, -apple-system, sans-serif; fill: #2a2a2a; }
      .code { font: 14px "SF Mono", Menlo, monospace; fill: #3a2a1a; }
      .label { font: 13px system-ui, -apple-system, sans-serif; fill: #5a5a5a; }
      .arrow { stroke: #7a6a5a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .highlight { fill: #ffeacc; stroke: #ffaa55; stroke-width: 2; }
      .box { fill: #e8f4ff; stroke: #3399ff; stroke-width: 2; }
      .box2 { fill: #f0ffe8; stroke: #66bb33; stroke-width: 2; }
      .box3 { fill: #fff0f5; stroke: #dd5599; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a6a5a"/>
    </marker>
  </defs>
  <rect width="720" height="320" class="bg"/>
  <rect x="16" y="16" width="688" height="288" rx="12" class="card"/>
  <text x="360" y="50" text-anchor="middle" class="title">module0-iterators</text>
  
  <rect x="60" y="80" width="170" height="80" rx="8" class="box"/>
  <text x="145" y="115" text-anchor="middle" class="text">数据源</text>
  <text x="145" y="145" text-anchor="middle" class="code">vec![1,2,3]</text>
  
  <line x1="230" y1="120" x2="300" y2="120" class="arrow"/>
  <text x="265" y="110" text-anchor="middle" class="label">.iter()</text>
  
  <rect x="300" y="80" width="170" height="80" rx="8" class="box2"/>
  <text x="385" y="115" text-anchor="middle" class="text">迭代器</text>
  <text x="385" y="145" text-anchor="middle" class="code">.map(...)</text>
  
  <line x1="470" y1="120" x2="540" y2="120" class="arrow"/>
  <text x="505" y="110" text-anchor="middle" class="label">.collect()</text>
  
  <rect x="540" y="80" width="120" height="80" rx="8" class="box3"/>
  <text x="600" y="115" text-anchor="middle" class="text">结果</text>
  <text x="600" y="145" text-anchor="middle" class="code">Vec</text>
  
  <text x="360" y="230" text-anchor="middle" class="text">💡 迭代器是“惰性”的：只有消费时才会真正执行</text>
  <text x="360" y="270" text-anchor="middle" class="code">let sum: i32 = (1..=100).sum();</text>

</svg>