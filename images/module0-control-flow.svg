<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360">
  <defs>
    <style>
      .bg { fill: #fff8f0; }
      .card { fill: #ffffff; stroke: #e0d6cc; stroke-width: 2; }
      .title { font: bold 22px system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .text { font: 15px system-ui, -apple-system, sans-serif; fill: #2a2a2a; }
      .code { font: 14px "SF Mono", Menlo, monospace; fill: #3a2a1a; }
      .label { font: 13px system-ui, -apple-system, sans-serif; fill: #5a5a5a; }
      .arrow { stroke: #7a6a5a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .highlight { fill: #ffeacc; stroke: #ffaa55; stroke-width: 2; }
      .box { fill: #e8f4ff; stroke: #3399ff; stroke-width: 2; }
      .box2 { fill: #f0ffe8; stroke: #66bb33; stroke-width: 2; }
      .box3 { fill: #fff0f5; stroke: #dd5599; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a6a5a"/>
    </marker>
  </defs>
  <rect width="720" height="360" class="bg"/>
  <rect x="16" y="16" width="688" height="328" rx="12" class="card"/>
  <text x="360" y="50" text-anchor="middle" class="title">module0-control-flow</text>
  
  <rect x="50" y="80" width="170" height="90" rx="8" class="box"/>
  <text x="135" y="115" text-anchor="middle" class="text">if / else</text>
  <text x="135" y="145" text-anchor="middle" class="label">条件分支</text>
  
  <rect x="275" y="80" width="170" height="90" rx="8" class="box2"/>
  <text x="360" y="115" text-anchor="middle" class="text">for / while</text>
  <text x="360" y="145" text-anchor="middle" class="label">循环遍历</text>
  
  <rect x="500" y="80" width="170" height="90" rx="8" class="box3"/>
  <text x="585" y="115" text-anchor="middle" class="text">match</text>
  <text x="585" y="145" text-anchor="middle" class="label">穷尽模式</text>
  
  <text x="360" y="230" text-anchor="middle" class="text">💡 Rust 中 if 是表达式，可直接返回值</text>
  <text x="360" y="260" text-anchor="middle" class="code">let x = if cond { 1 } else { 2 };</text>
  
  <text x="360" y="310" text-anchor="middle" class="text">⚠️ loop 可用 break value; 返回一个值</text>

</svg>