<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">闭包：捕获环境变量</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs>
  <rect x="40" y="56" width="560" height="270" fill="#fff3e0" stroke="#d4a76a" stroke-width="2" rx="8"/>
  <text x="320" y="84" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">闭包按需捕获环境变量（不可变借用 / 可变借用 / move）</text>
  <!-- 环境作用域框 -->
  <rect x="70" y="110" width="180" height="100" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="160" y="140" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">环境作用域</text>
  <text x="160" y="168" font-size="13" fill="#3d3229" text-anchor="middle">let offset = 10;</text>
  <text x="160" y="190" font-size="12" fill="#666" text-anchor="middle">外部变量</text>
  <!-- 捕获箭头 + 标注 -->
  <line x1="250" y1="160" x2="316" y2="160" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="283" y="150" font-size="12" fill="#5c4b37" text-anchor="middle">捕获</text>
  <!-- 闭包框 -->
  <rect x="320" y="110" width="250" height="100" fill="#fff3e0" stroke="#fb8c00" stroke-width="2" rx="8"/>
  <text x="445" y="140" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">let add_offset = |x| x + offset;</text>
  <text x="445" y="168" font-size="12" fill="#666" text-anchor="middle">闭包不可变借用 offset</text>
  <text x="445" y="190" font-size="12" fill="#666" text-anchor="middle">Fn / FnMut / FnOnce</text>
  <!-- 调用箭头 -->
  <line x1="445" y1="210" x2="445" y2="246" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 调用结果框 -->
  <rect x="345" y="250" width="200" height="50" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" rx="8"/>
  <text x="445" y="281" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">add_offset(5) // =&gt; 15</text>
</svg>
