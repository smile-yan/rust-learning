<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">闭包：捕获环境变量</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs><rect x="60" y="70" width="200" height="100" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/><text x="160" y="100" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">环境作用域</text><text x="160" y="130" font-size="13" font-weight="normal" fill="#3d3229" text-anchor="middle">let offset = 10;</text><rect x="300" y="120" width="280" height="120" fill="#fff3e0" stroke="#fb8c00" stroke-width="2" rx="8"/><text x="440" y="155" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">let add_offset = |x| x + offset;</text><text x="440" y="185" font-size="12" font-weight="normal" fill="#666" text-anchor="middle">闭包不可变借用 offset</text><line x1="210" y1="130" x2="300" y2="160" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/><text x="250" y="145" font-size="12" font-weight="normal" fill="#5c4b37" text-anchor="start">捕获</text><line x1="440" y1="240" x2="440" y2="280" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/><text x="440" y="300" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">add_offset(5) // =&gt; 15</text>
</svg>