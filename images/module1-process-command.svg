<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="384" viewBox="0 0 640 384">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">进程管理 std::process::Command</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs>
  <rect x="40" y="56" width="560" height="294" fill="#fff3e0" stroke="#d4a76a" stroke-width="2" rx="8"/>
  <text x="320" y="86" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">Command 调用外部进程</text>
  <rect x="75" y="110" width="170" height="80" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="160" y="133" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">Command::new</text>
  <text x="160" y="153" font-size="12" fill="#666" text-anchor="middle">Command::new("ls")</text>
  <text x="160" y="170" font-size="12" fill="#666" text-anchor="middle">.arg("-la")</text>
  <text x="160" y="186" font-size="12" fill="#666" text-anchor="middle">.env("KEY", "value")</text>
  <line x1="245" y1="150" x2="405" y2="150" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="410" y="110" width="140" height="80" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/>
  <text x="480" y="133" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">配置进程</text>
  <text x="480" y="153" font-size="12" fill="#666" text-anchor="middle">stdin / stdout</text>
  <text x="480" y="170" font-size="12" fill="#666" text-anchor="middle">.spawn()</text>
  <text x="480" y="186" font-size="12" fill="#666" text-anchor="middle">.output()</text>
  <line x1="480" y1="190" x2="480" y2="228" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="360" y="232" width="240" height="65" fill="#fce4ec" stroke="#ec407a" stroke-width="2" rx="8"/>
  <text x="480" y="256" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">Output 结果</text>
  <text x="480" y="274" font-size="12" fill="#666" text-anchor="middle">stdout · stderr · status（ExitStatus）</text>
  <text x="320" y="332" font-size="13" fill="#5c4b37" text-anchor="middle">spawn 异步执行，output 等待完成并捕获输出</text>
</svg>
