<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <rect width="600" height="320" fill="#fff8f0" rx="10"/>
  <text x="300" y="30" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">⏳ Future 状态机</text>
  <circle cx="90" cy="170" r="50" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="90" y="165" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1b5e20">Start</text>
  <text x="90" y="185" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#333">创建 Future</text>
  <rect x="190" y="120" width="160" height="100" fill="#fff3e0" stroke="#ef6c00" stroke-width="2" rx="8"/>
  <text x="270" y="155" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#e65100">Poll::Pending</text>
  <text x="270" y="180" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333">等待 I/O / 定时器</text>
  <text x="270" y="200" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333">让出线程</text>
  <rect x="400" y="120" width="160" height="100" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" rx="8"/>
  <text x="480" y="155" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#0d47a1">Poll::Ready(T)</text>
  <text x="480" y="180" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333">计算完成</text>
  <text x="480" y="200" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#333">返回结果</text>
  <path d="M 140 170 L 190 170" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 350 170 L 400 170" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 270 220 C 220 260, 320 260, 270 220" stroke="#ef6c00" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="150" y="160" font-family="system-ui, sans-serif" font-size="11" fill="#666">poll</text>
  <text x="370" y="160" font-family="system-ui, sans-serif" font-size="11" fill="#666">wakeup</text>
  <text x="200" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#666">async/await 自动展开</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
</svg>