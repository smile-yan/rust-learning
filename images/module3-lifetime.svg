<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" role="img" aria-label="生命周期作用域示意">
  <title>生命周期作用域示意</title>
  <defs>
    <style>
      .bg { fill: #fff8f0; }
      .card { fill: #ffffff; stroke: #e0d6cc; stroke-width: 2; }
      .title { font: bold 22px system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .code { font: 13px "SF Mono", Menlo, monospace; fill: #3a2a1a; }
      .linenum { font: 11px "SF Mono", Menlo, monospace; fill: #b0a89e; }
      .label { font: 13px system-ui, -apple-system, sans-serif; fill: #5a5a5a; }
      .lane-a { font: bold 14px system-ui, -apple-system, sans-serif; fill: #4a8f1f; }
      .lane-b { font: bold 14px system-ui, -apple-system, sans-serif; fill: #e0620a; }
      .lane-r { font: bold 14px system-ui, -apple-system, sans-serif; fill: #2277cc; }
      .bar-a { fill: #f0ffe8; stroke: #66bb33; stroke-width: 2; }
      .bar-b { fill: #ffd9b3; stroke: #f97316; stroke-width: 2; }
      .bar-r { fill: #cfe4f7; stroke: #3399ff; stroke-width: 2; }
      .bar-bad { fill: #ffdcdc; stroke: #d32f2f; stroke-width: 2; stroke-dasharray: 5 3; }
      .note { font: 13px system-ui, -apple-system, sans-serif; fill: #d32f2f; }
      .chip-a { fill: #f0ffe8; stroke: #66bb33; stroke-width: 1.5; }
      .chip-b { fill: #ffd9b3; stroke: #f97316; stroke-width: 1.5; }
      .chip-r { fill: #cfe4f7; stroke: #3399ff; stroke-width: 1.5; }
      .bad-line { stroke: #d32f2f; stroke-width: 1.5; stroke-dasharray: 4 3; }
      .err-row { fill: #fff0f0; }
    </style>
  </defs>
  <rect width="720" height="400" class="bg"/>
  <rect x="16" y="16" width="688" height="368" rx="12" class="card"/>
  <text x="360" y="50" text-anchor="middle" class="title">⏳ 生命周期：每个变量都有存活区间</text>

  <!-- 左侧：代码（行号对应右侧存活区间）。r 在外层声明，才能演示「借来的 b 活得不够久」 -->
  <rect x="36" y="276" width="336" height="28" rx="4" class="err-row"/>
  <text x="46" y="100" class="linenum">1</text>
  <text x="64" y="100" class="code">let a = String::from("long");</text>
  <text x="46" y="132" class="linenum">2</text>
  <text x="64" y="132" class="code">let r;</text>
  <text x="46" y="164" class="linenum">3</text>
  <text x="64" y="164" class="code">{</text>
  <text x="46" y="196" class="linenum">4</text>
  <text x="64" y="196" class="code" xml:space="preserve">    let b = String::from("short");</text>
  <text x="46" y="228" class="linenum">5</text>
  <text x="64" y="228" class="code" xml:space="preserve">    r = &amp;b;</text>
  <text x="46" y="260" class="linenum">6</text>
  <text x="64" y="260" class="code">}</text>
  <text x="46" y="292" class="linenum">7</text>
  <text x="64" y="292" class="code">println!("{}", r);</text>

  <!-- 右侧：三个变量的存活区间（竖向色带，与代码行对齐） -->
  <text x="445" y="80" text-anchor="middle" class="lane-a">a</text>
  <rect x="430" y="88" width="30" height="216" rx="8" class="bar-a"/>

  <text x="525" y="112" text-anchor="middle" class="lane-r">r</text>
  <rect x="510" y="120" width="30" height="184" rx="8" class="bar-r"/>
  <!-- r 超出 b 的部分：悬垂引用 -->
  <rect x="510" y="272" width="30" height="32" rx="8" class="bar-bad"/>

  <text x="625" y="176" text-anchor="middle" class="lane-b">b</text>
  <rect x="610" y="184" width="30" height="88" rx="8" class="bar-b"/>

  <line x1="542" y1="272" x2="608" y2="272" class="bad-line"/>
  <text x="575" y="264" text-anchor="middle" class="note">b 已释放</text>

  <!-- 底部图例 -->
  <rect x="56" y="322" width="14" height="14" rx="3" class="chip-a"/>
  <text x="78" y="334" class="label">a 存活整个作用域</text>
  <rect x="236" y="322" width="14" height="14" rx="3" class="chip-r"/>
  <text x="258" y="334" class="label">r 借用 b，却想比 b 活得更久</text>
  <rect x="480" y="322" width="14" height="14" rx="3" class="chip-b"/>
  <text x="502" y="334" class="label">b 到第 6 行 } 结束</text>
  <text x="78" y="364" class="note">❌ 第 7 行使用 r 时 b 已释放：悬垂引用，编译报错（borrowed value does not live long enough）</text>
</svg>
