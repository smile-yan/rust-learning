<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="334" viewBox="0 0 720 334">
  <defs>
    <style>
      .bg { fill: #fff8f0; }
      .card { fill: #ffffff; stroke: #e0d6cc; stroke-width: 2; }
      .title { font: bold 22px system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .text { font: 15px system-ui, -apple-system, sans-serif; fill: #2a2a2a; }
      .code { font: 14px "SF Mono", Menlo, monospace; fill: #3a2a1a; }
      .label { font: 13px system-ui, -apple-system, sans-serif; fill: #5a5a5a; }
      .arrow { stroke: #7a6a5a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .highlight { fill: #ffeacc; stroke: #ffaa55; stroke-width: 2; }
      .box { fill: #e8f4ff; stroke: #3399ff; stroke-width: 2; }
      .box2 { fill: #f0ffe8; stroke: #66bb33; stroke-width: 2; }
      .box3 { fill: #fff0f5; stroke: #dd5599; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a6a5a"/>
    </marker>
  </defs>
  <rect width="720" height="334" class="bg"/>
  <rect x="16" y="16" width="688" height="302" rx="12" class="card"/>
  <text x="360" y="50" text-anchor="middle" class="title">Result 与 Option：把结果包起来</text>
  <rect x="55" y="85" width="290" height="165" rx="10" class="box"/>
  <text x="200" y="115" text-anchor="middle" class="code">Result&lt;T, E&gt;</text>
  <rect x="75" y="132" width="90" height="30" rx="6" class="box2"/>
  <text x="120" y="152" text-anchor="middle" class="code">Ok(T)</text>
  <text x="180" y="152" class="label">成功，拿到值</text>
  <rect x="75" y="178" width="90" height="30" rx="6" class="box3"/>
  <text x="120" y="198" text-anchor="middle" class="code">Err(E)</text>
  <text x="180" y="198" class="label">失败，携带错误</text>
  <rect x="375" y="85" width="290" height="165" rx="10" class="box"/>
  <text x="520" y="115" text-anchor="middle" class="code">Option&lt;T&gt;</text>
  <rect x="395" y="132" width="90" height="30" rx="6" class="box2"/>
  <text x="440" y="152" text-anchor="middle" class="code">Some(T)</text>
  <text x="500" y="152" class="label">有值</text>
  <rect x="395" y="178" width="90" height="30" rx="6" class="box3"/>
  <text x="440" y="198" text-anchor="middle" class="code">None</text>
  <text x="500" y="198" class="label">无值</text>
  <text x="360" y="290" text-anchor="middle" class="label">调用者必须显式处理每一种结果，没有隐式忽略</text>
</svg>
