<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340">
  <defs>
    <style>
      .bg { fill: #fff8f0; }
      .card { fill: #ffffff; stroke: #e0d6cc; stroke-width: 2; }
      .title { font: bold 22px system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .text { font: 15px system-ui, -apple-system, sans-serif; fill: #2a2a2a; }
      .code { font: 14px "SF Mono", Menlo, monospace; fill: #3a2a1a; }
      .label { font: 13px system-ui, -apple-system, sans-serif; fill: #5a5a5a; }
      .arrow { stroke: #7a6a5a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .highlight { fill: #ffeacc; stroke: #ffaa55; stroke-width: 2; }
      .box { fill: #e8f4ff; stroke: #3399ff; stroke-width: 2; }
      .box2 { fill: #f0ffe8; stroke: #66bb33; stroke-width: 2; }
      .box3 { fill: #fff0f5; stroke: #dd5599; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a6a5a"/>
    </marker>
  </defs>
  <rect width="720" height="340" class="bg"/>
  <rect x="16" y="16" width="688" height="308" rx="12" class="card"/>
  <text x="360" y="50" text-anchor="middle" class="title">没有 class 继承，Rust 怎么做</text>
  <rect x="45" y="85" width="280" height="175" rx="10" class="box3"/>
  <text x="185" y="115" text-anchor="middle" class="text">传统继承</text>
  <text x="65" y="150" class="code">class Dog extends Animal</text>
  <text x="65" y="185" class="label">· 单继承，层次受限</text>
  <text x="65" y="215" class="label">· 深耦合，脆弱基类</text>
  <rect x="395" y="85" width="280" height="175" rx="10" class="box2"/>
  <text x="535" y="115" text-anchor="middle" class="text">Rust 替代方案</text>
  <text x="415" y="150" class="code">impl Animal for Dog</text>
  <text x="415" y="175" class="label">↑ trait 实现：行为契约</text>
  <text x="415" y="210" class="code">struct Dog { animal: Animal }</text>
  <text x="415" y="235" class="label">↑ 组合：包含即拥有</text>
  <text x="360" y="300" text-anchor="middle" class="label">用 trait 契约和组合拼装能力，替代类层次继承</text>
</svg>
