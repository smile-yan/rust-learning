<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">正则表达式 regex：在文本中搜索模式</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs>
  <rect x="40" y="55" width="560" height="250" fill="#fff3e0" stroke="#d4a76a" stroke-width="2" rx="8"/>
  <text x="320" y="85" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">输入文本 → Regex 引擎 → 匹配结果</text>
  <rect x="70" y="108" width="180" height="74" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="160" y="136" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">原始文本</text>
  <text x="160" y="154" font-size="12" fill="#666" text-anchor="middle">"hello rust123"</text>
  <text x="160" y="170" font-size="12" fill="#666" text-anchor="middle">"abc@example.com"</text>
  <line x1="250" y1="145" x2="300" y2="145" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="310" y="108" width="140" height="74" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/>
  <text x="380" y="136" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">Regex 模式</text>
  <text x="380" y="154" font-size="12" fill="#666" text-anchor="middle">\d+ → 匹配数字</text>
  <text x="380" y="170" font-size="12" fill="#666" text-anchor="middle">\w+@\w+\.\w+</text>
  <line x1="380" y1="182" x2="380" y2="220" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="230" y="225" width="300" height="50" fill="#fce4ec" stroke="#ec407a" stroke-width="2" rx="8"/>
  <text x="380" y="250" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">Match / Captures / Replace</text>
  <text x="380" y="264" font-size="12" fill="#666" text-anchor="middle">find · split · replace_all</text>
  <text x="320" y="300" font-size="13" fill="#5c4b37" text-anchor="middle">编译一次，多次复用；零拷贝切片引用匹配结果</text>
</svg>
