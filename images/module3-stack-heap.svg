<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="390" viewBox="0 0 720 390" role="img" aria-label="栈与堆的内存布局">
  <title>栈与堆的内存布局</title>
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="360" y="34" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#3d2b1f">📦 栈与堆的内存布局</text>

  <rect x="40" y="60" width="280" height="280" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" rx="8"/>
  <text x="180" y="88" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">栈 Stack</text>
  <text x="180" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555">自动管理、LIFO、速度快</text>

  <rect x="70" y="130" width="220" height="36" fill="#ffffff" stroke="#1565c0" stroke-width="1.5" rx="4"/>
  <text x="180" y="153" text-anchor="middle" font-family="monospace" font-size="13" fill="#333">x: i32 = 5</text>

  <rect x="70" y="175" width="220" height="36" fill="#ffffff" stroke="#1565c0" stroke-width="1.5" rx="4"/>
  <text x="180" y="198" text-anchor="middle" font-family="monospace" font-size="13" fill="#333">y: bool = true</text>

  <rect x="70" y="220" width="220" height="36" fill="#ffffff" stroke="#1565c0" stroke-width="1.5" rx="4"/>
  <text x="180" y="243" text-anchor="middle" font-family="monospace" font-size="13" fill="#333">String struct (ptr/len/cap)</text>

  <rect x="70" y="265" width="220" height="36" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,2" rx="4"/>
  <text x="180" y="288" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0d47a1">main() 栈帧</text>

  <rect x="380" y="60" width="300" height="280" fill="#fff3e0" stroke="#ef6c00" stroke-width="2" rx="8"/>
  <text x="530" y="88" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#e65100">堆 Heap</text>
  <text x="530" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555">动态分配、生命周期复杂</text>

  <rect x="410" y="130" width="240" height="50" fill="#ffffff" stroke="#ef6c00" stroke-width="1.5" rx="4"/>
  <text x="530" y="150" text-anchor="middle" font-family="monospace" font-size="13" fill="#333">String 实际内容</text>
  <text x="530" y="170" text-anchor="middle" font-family="monospace" font-size="13" fill="#333">&quot;hello, Rust&quot;</text>

  <rect x="410" y="200" width="240" height="50" fill="#ffffff" stroke="#ef6c00" stroke-width="1.5" rx="4"/>
  <text x="530" y="220" text-anchor="middle" font-family="monospace" font-size="13" fill="#333">Vec 元素</text>
  <text x="530" y="240" text-anchor="middle" font-family="monospace" font-size="13" fill="#333">[1, 2, 3]</text>

  <path d="M 290 238 L 410 155" stroke="#d9534f" stroke-width="2" marker-end="url(#arrow-red)" fill="none"/>
  <text x="340" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#d9534f">ptr 指向</text>

  <text x="180" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0d47a1">✅ 固定大小、编译期确定 → 栈</text>
  <text x="530" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#e65100">⚠️ 动态大小、运行时分配 → 堆</text>

  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d9534f"/>
    </marker>
  </defs>
</svg>
