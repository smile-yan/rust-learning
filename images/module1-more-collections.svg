<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">更多集合类型：HashMap / HashSet / BTreeMap</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs>
  <rect x="40" y="55" width="560" height="250" fill="#fff3e0" stroke="#d4a76a" stroke-width="2" rx="8"/>
  <text x="320" y="85" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">集合类型对比</text>
  <rect x="60" y="105" width="135" height="110" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="127" y="130" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">Vec&lt;T&gt;</text>
  <text x="127" y="152" font-size="12" fill="#666" text-anchor="middle">有序、可重复</text>
  <text x="127" y="170" font-size="12" fill="#666" text-anchor="middle">索引 O(1)</text>
  <text x="127" y="188" font-size="12" fill="#666" text-anchor="middle">push / pop</text>
  <line x1="195" y1="160" x2="230" y2="160" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="240" y="105" width="135" height="110" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/>
  <text x="307" y="130" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">HashMap&lt;K,V&gt;</text>
  <text x="307" y="152" font-size="12" fill="#666" text-anchor="middle">无序键值对</text>
  <text x="307" y="170" font-size="12" fill="#666" text-anchor="middle">查找 O(1) 平均</text>
  <text x="307" y="188" font-size="12" fill="#666" text-anchor="middle">insert / get</text>
  <line x1="375" y1="160" x2="410" y2="160" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="420" y="105" width="135" height="110" fill="#fce4ec" stroke="#ec407a" stroke-width="2" rx="8"/>
  <text x="487" y="130" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">HashSet&lt;T&gt;</text>
  <text x="487" y="152" font-size="12" fill="#666" text-anchor="middle">无序、唯一</text>
  <text x="487" y="170" font-size="12" fill="#666" text-anchor="middle">包含 O(1)</text>
  <text x="487" y="188" font-size="12" fill="#666" text-anchor="middle">insert / remove</text>
  <line x1="307" y1="215" x2="307" y2="240" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="200" y="245" width="240" height="45" fill="#fff3e0" stroke="#fb8c00" stroke-width="2" rx="8"/>
  <text x="320" y="268" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">BTreeMap / BTreeSet：有序、O(log n)</text>
  <text x="320" y="318" font-size="13" fill="#5c4b37" text-anchor="middle">按场景选择：去重用 HashSet，映射用 HashMap，需要有序用 BTreeMap</text>
</svg>
