<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="350" viewBox="0 0 720 350">
  <defs>
    <style>
      .bg { fill: #fff8f0; }
      .card { fill: #ffffff; stroke: #e0d6cc; stroke-width: 2; }
      .title { font: bold 22px system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .text { font: 15px system-ui, -apple-system, sans-serif; fill: #2a2a2a; }
      .code { font: 14px "SF Mono", Menlo, monospace; fill: #3a2a1a; }
      .label { font: 13px system-ui, -apple-system, sans-serif; fill: #5a5a5a; }
      .arrow { stroke: #7a6a5a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .highlight { fill: #ffeacc; stroke: #ffaa55; stroke-width: 2; }
      .box { fill: #e8f4ff; stroke: #3399ff; stroke-width: 2; }
      .box2 { fill: #f0ffe8; stroke: #66bb33; stroke-width: 2; }
      .box3 { fill: #fff0f5; stroke: #dd5599; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a6a5a"/>
    </marker>
  </defs>
  <rect width="720" height="350" class="bg"/>
  <rect x="16" y="16" width="688" height="318" rx="12" class="card"/>
  <text x="360" y="50" text-anchor="middle" class="title">module0-ownership</text>
  
  <text x="60" y="90" class="text">🦀 所有权三规则</text>
  <text x="80" y="125" class="label">1. 每个值都有一个所有者</text>
  <text x="80" y="155" class="label">2. 同一时刻只有一个所有者</text>
  <text x="80" y="185" class="label">3. 所有者离开作用域，值被释放</text>
  
  <rect x="60" y="230" width="160" height="70" rx="8" class="box"/>
  <text x="140" y="260" text-anchor="middle" class="text">s1</text>
  <text x="140" y="285" text-anchor="middle" class="code">String::from(&quot;hi&quot;)</text>
  
  <line x1="220" y1="265" x2="300" y2="265" class="arrow"/>
  <text x="260" y="255" text-anchor="middle" class="label">move</text>
  
  <rect x="300" y="230" width="160" height="70" rx="8" class="box2"/>
  <text x="380" y="260" text-anchor="middle" class="text">s2</text>
  <text x="380" y="285" text-anchor="middle" class="label">获得所有权</text>
  
  <text x="520" y="260" class="text">✅ 无双重释放</text>
  <text x="520" y="285" class="text">✅ 无悬空指针</text>

</svg>