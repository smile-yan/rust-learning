<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">消息传递：mpsc 通道</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs><rect x="60" y="100" width="160" height="90" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/><text x="140" y="135" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">发送线程</text><text x="140" y="160" font-size="12" font-weight="normal" fill="#3d3229" text-anchor="middle">tx.send(val)</text><rect x="260" y="115" width="120" height="60" fill="#fff3e0" stroke="#fb8c00" stroke-width="2" rx="8"/><text x="320" y="150" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">mpsc
通道</text><rect x="420" y="100" width="160" height="90" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/><text x="500" y="135" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">接收线程</text><text x="500" y="160" font-size="12" font-weight="normal" fill="#3d3229" text-anchor="middle">rx.recv()</text><line x1="220" y1="145" x2="260" y2="145" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/><line x1="380" y1="145" x2="420" y2="145" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/><text x="320" y="60" font-size="14" font-weight="normal" fill="#5c4b37" text-anchor="middle">所有权随消息转移：发送后发送方不能再使用数据</text><text x="320" y="240" font-size="13" font-weight="normal" fill="#666" text-anchor="middle">多生产者单消费者 (mpsc) 是 Rust 消息传递的核心模式</text>
</svg>