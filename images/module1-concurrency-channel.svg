<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">消息传递：mpsc 通道</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs>
  <rect x="40" y="56" width="560" height="270" fill="#fff3e0" stroke="#d4a76a" stroke-width="2" rx="8"/>
  <text x="320" y="84" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">所有权随消息转移：发送后发送方不能再使用数据</text>
  <!-- 发送线程 → msc 通道 → 接收线程，三框同高对齐 -->
  <rect x="70" y="120" width="160" height="100" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/>
  <text x="150" y="155" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">发送线程</text>
  <text x="150" y="180" font-size="12" fill="#666" text-anchor="middle">tx.send(val)</text>
  <text x="150" y="200" font-size="12" fill="#666" text-anchor="middle">交出所有权</text>
  <line x1="230" y1="170" x2="270" y2="170" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="270" y="120" width="100" height="100" fill="#fff3e0" stroke="#fb8c00" stroke-width="2" rx="8"/>
  <text x="320" y="165" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">mpsc</text>
  <text x="320" y="185" font-size="12" fill="#666" text-anchor="middle">通道</text>
  <text x="320" y="205" font-size="12" fill="#666" text-anchor="middle">有界缓冲</text>
  <line x1="370" y1="170" x2="410" y2="170" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="410" y="120" width="160" height="100" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="490" y="155" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">接收线程</text>
  <text x="490" y="180" font-size="12" fill="#666" text-anchor="middle">rx.recv()</text>
  <text x="490" y="200" font-size="12" fill="#666" text-anchor="middle">取得所有权</text>
  <text x="320" y="285" font-size="13" fill="#5c4b37" text-anchor="middle">多生产者单消费者 (mpsc) 是 Rust 消息传递的核心模式</text>
</svg>
