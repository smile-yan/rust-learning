<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="384" viewBox="0 0 640 384">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">常用设计模式（Rust 风格）</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs>
  <rect x="40" y="55" width="560" height="290" fill="#fff3e0" stroke="#d4a76a" stroke-width="2" rx="8"/>
  <text x="320" y="85" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">Rust 风格的设计模式</text>
  <rect x="89" y="110" width="126" height="88" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="152" y="131" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">策略模式</text>
  <text x="152" y="151" font-size="12" fill="#666" text-anchor="middle">trait + dyn</text>
  <text x="152" y="169" font-size="12" fill="#666" text-anchor="middle">运行时切换</text>
  <text x="152" y="187" font-size="12" fill="#666" text-anchor="middle">行为可插拔</text>
  <line x1="215" y1="154" x2="257" y2="154" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="257" y="110" width="126" height="88" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/>
  <text x="320" y="131" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">状态机模式</text>
  <text x="320" y="151" font-size="12" fill="#666" text-anchor="middle">enum + match</text>
  <text x="320" y="169" font-size="12" fill="#666" text-anchor="middle">编译期穷尽</text>
  <text x="320" y="187" font-size="12" fill="#666" text-anchor="middle">状态不可随意组合</text>
  <line x1="383" y1="154" x2="425" y2="154" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="425" y="110" width="126" height="88" fill="#fce4ec" stroke="#ec407a" stroke-width="2" rx="8"/>
  <text x="488" y="131" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">观察者模式</text>
  <text x="488" y="151" font-size="12" fill="#666" text-anchor="middle">closure / Fn</text>
  <text x="488" y="169" font-size="12" fill="#666" text-anchor="middle">回调列表</text>
  <text x="488" y="187" font-size="12" fill="#666" text-anchor="middle">事件通知</text>
  <line x1="320" y1="198" x2="320" y2="232" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="190" y="236" width="260" height="50" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="320" y="259" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">构建者模式 Builder</text>
  <text x="320" y="279" font-size="12" fill="#666" text-anchor="middle">链式调用、默认值、不可变构建</text>
  <text x="320" y="326" font-size="13" fill="#5c4b37" text-anchor="middle">Rust 用 trait、枚举和闭包重新诠释经典模式</text>
</svg>
