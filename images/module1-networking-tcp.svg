<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="384" viewBox="0 0 640 384">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">网络编程基础：TcpListener / TcpStream</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs>
  <rect x="40" y="55" width="560" height="290" fill="#fff3e0" stroke="#d4a76a" stroke-width="2" rx="8"/>
  <text x="320" y="85" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">TCP 客户端-服务端通信</text>
  <rect x="80" y="110" width="160" height="88" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="160" y="131" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">Server</text>
  <text x="160" y="151" font-size="12" fill="#666" text-anchor="middle">TcpListener::bind</text>
  <text x="160" y="169" font-size="12" fill="#666" text-anchor="middle">.accept() → TcpStream</text>
  <text x="160" y="187" font-size="12" fill="#666" text-anchor="middle">read / write</text>
  <line x1="240" y1="154" x2="400" y2="154" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="138" font-size="12" fill="#5c4b37" text-anchor="middle">TCP 连接</text>
  <text x="320" y="174" font-size="12" fill="#5c4b37" text-anchor="middle">127.0.0.1:8080</text>
  <rect x="400" y="110" width="160" height="88" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/>
  <text x="480" y="131" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">Client</text>
  <text x="480" y="151" font-size="12" fill="#666" text-anchor="middle">TcpStream::connect</text>
  <text x="480" y="169" font-size="12" fill="#666" text-anchor="middle">.write()</text>
  <text x="480" y="187" font-size="12" fill="#666" text-anchor="middle">.read()</text>
  <line x1="320" y1="198" x2="320" y2="232" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="190" y="236" width="260" height="50" fill="#fce4ec" stroke="#ec407a" stroke-width="2" rx="8"/>
  <text x="320" y="259" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">std::net：无依赖、零成本抽象</text>
  <text x="320" y="279" font-size="12" fill="#666" text-anchor="middle">SocketAddr · BufReader / BufWriter</text>
  <text x="320" y="326" font-size="13" fill="#5c4b37" text-anchor="middle">std::net 是异步网络框架（tokio/axum）的基础</text>
</svg>
