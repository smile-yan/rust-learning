  <rect width="520" height="320" fill="#fff8f0" rx="10"/>
  <text x="260" y="30" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">🛡️ safe API 包裹 unsafe 核心</text>
