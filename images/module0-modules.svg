<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="350" viewBox="0 0 720 350">
  <defs>
    <style>
      .bg { fill: #fff8f0; }
      .card { fill: #ffffff; stroke: #e0d6cc; stroke-width: 2; }
      .title { font: bold 22px system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .text { font: 15px system-ui, -apple-system, sans-serif; fill: #2a2a2a; }
      .code { font: 14px "SF Mono", Menlo, monospace; fill: #3a2a1a; }
      .label { font: 13px system-ui, -apple-system, sans-serif; fill: #5a5a5a; }
      .arrow { stroke: #7a6a5a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .highlight { fill: #ffeacc; stroke: #ffaa55; stroke-width: 2; }
      .box { fill: #e8f4ff; stroke: #3399ff; stroke-width: 2; }
      .box2 { fill: #f0ffe8; stroke: #66bb33; stroke-width: 2; }
      .box3 { fill: #fff0f5; stroke: #dd5599; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a6a5a"/>
    </marker>
  </defs>
  <rect width="720" height="350" class="bg"/>
  <rect x="16" y="16" width="688" height="318" rx="12" class="card"/>
  <text x="360" y="50" text-anchor="middle" class="title">module0-modules</text>
  
  <rect x="60" y="80" width="220" height="120" rx="8" class="box"/>
  <text x="80" y="115" class="text">crate（包根）</text>
  <text x="80" y="150" class="label">main.rs / lib.rs</text>
  <text x="80" y="180" class="code">mod foo;</text>
  
  <rect x="320" y="80" width="180" height="120" rx="8" class="box2"/>
  <text x="340" y="115" class="text">module</text>
  <text x="340" y="150" class="label">foo.rs 或 foo/mod.rs</text>
  <text x="340" y="180" class="code">pub fn bar()</text>
  
  <rect x="540" y="80" width="140" height="120" rx="8" class="box3"/>
  <text x="560" y="115" class="text">可见性</text>
  <text x="560" y="150" class="label">pub</text>
  <text x="560" y="180" class="label">private</text>
  
  <text x="360" y="260" text-anchor="middle" class="text">🦀 use 关键字创建快捷方式，避免写长路径</text>
  <text x="360" y="300" text-anchor="middle" class="code">use crate::foo::bar;</text>

</svg>