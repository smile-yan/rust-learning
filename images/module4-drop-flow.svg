<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="368" viewBox="0 0 720 368">
  <defs>
    <style>
      .bg { fill: #fff8f0; }
      .card { fill: #ffffff; stroke: #e0d6cc; stroke-width: 2; }
      .title { font: bold 22px system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .text { font: 15px system-ui, -apple-system, sans-serif; fill: #2a2a2a; }
      .code { font: 14px "SF Mono", Menlo, monospace; fill: #3a2a1a; }
      .label { font: 13px system-ui, -apple-system, sans-serif; fill: #5a5a5a; }
      .arrow { stroke: #7a6a5a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .highlight { fill: #ffeacc; stroke: #ffaa55; stroke-width: 2; }
      .box { fill: #e8f4ff; stroke: #3399ff; stroke-width: 2; }
      .box2 { fill: #f0ffe8; stroke: #66bb33; stroke-width: 2; }
      .box3 { fill: #fff0f5; stroke: #dd5599; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a6a5a"/>
    </marker>
  </defs>
  <rect width="720" height="368" class="bg"/>
  <rect x="16" y="16" width="688" height="336" rx="12" class="card"/>
  <text x="360" y="50" text-anchor="middle" class="title">没有 GC：离开作用域即释放</text>
  <!-- CONTENT -->
  <rect x="210" y="85" width="300" height="44" rx="8" class="box"/>
  <text x="360" y="114" text-anchor="middle" class="text">值离开作用域</text>
  <line x1="360" y1="131" x2="360" y2="156" class="arrow"/>
  <rect x="210" y="160" width="300" height="44" rx="8" class="highlight"/>
  <text x="360" y="189" text-anchor="middle" class="text">自动调用 drop()</text>
  <line x1="360" y1="206" x2="360" y2="231" class="arrow"/>
  <rect x="210" y="235" width="300" height="44" rx="8" class="box2"/>
  <text x="360" y="264" text-anchor="middle" class="text">内存 / 资源被释放</text>
  <text x="360" y="320" text-anchor="middle" class="label">释放时机在编译期就完全确定，无需运行时扫描</text>
</svg>
