<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" role="img" aria-label="RAII 资源生命周期">
  <title>RAII 资源生命周期</title>
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="360" y="34" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#3d2b1f">🔒 RAII 资源生命周期</text>

  <rect x="40" y="60" width="640" height="220" fill="#f1f8e9" stroke="#558b2f" stroke-width="2" rx="8"/>

  <circle cx="120" cy="140" r="24" fill="#ffffff" stroke="#558b2f" stroke-width="2"/>
  <text x="120" y="146" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#33691e">创建</text>
  <text x="120" y="182" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">new()</text>

  <rect x="200" y="120" width="320" height="40" fill="#ffffff" stroke="#558b2f" stroke-width="1.5" rx="4"/>
  <text x="360" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#33691e">🛠️ 使用资源（读取/写入/计算）</text>

  <circle cx="600" cy="140" r="24" fill="#ffffff" stroke="#558b2f" stroke-width="2"/>
  <text x="600" y="146" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#33691e">释放</text>
  <text x="600" y="182" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">drop()</text>

  <path d="M 144 140 L 196 140" stroke="#558b2f" stroke-width="3" marker-end="url(#arrow-green)" fill="none"/>
  <path d="M 524 140 L 576 140" stroke="#558b2f" stroke-width="3" marker-end="url(#arrow-green)" fill="none"/>

  <text x="360" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#33691e">资源获取即初始化，离开作用域自动调用 Drop</text>
  <text x="360" y="222" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#33691e">适用于内存、文件、锁、网络连接等一切资源</text>
  <text x="360" y="244" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#33691e">🦀 无需手动 free/close/unlock</text>

  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#558b2f"/>
    </marker>
  </defs>
</svg>
