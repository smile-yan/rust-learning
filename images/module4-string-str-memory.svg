<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="390" viewBox="0 0 720 390">
  <defs>
    <style>
      .bg { fill: #fff8f0; }
      .card { fill: #ffffff; stroke: #e0d6cc; stroke-width: 2; }
      .title { font: bold 22px system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .text { font: 15px system-ui, -apple-system, sans-serif; fill: #2a2a2a; }
      .code { font: 14px "SF Mono", Menlo, monospace; fill: #3a2a1a; }
      .label { font: 13px system-ui, -apple-system, sans-serif; fill: #5a5a5a; }
      .arrow { stroke: #7a6a5a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .highlight { fill: #ffeacc; stroke: #ffaa55; stroke-width: 2; }
      .box { fill: #e8f4ff; stroke: #3399ff; stroke-width: 2; }
      .box2 { fill: #f0ffe8; stroke: #66bb33; stroke-width: 2; }
      .box3 { fill: #fff0f5; stroke: #dd5599; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a6a5a"/>
    </marker>
  </defs>
  <rect width="720" height="390" class="bg"/>
  <rect x="16" y="16" width="688" height="358" rx="12" class="card"/>
  <text x="360" y="50" text-anchor="middle" class="title">String 与 &amp;str 的内存布局</text>
  <rect x="45" y="85" width="260" height="120" rx="10" class="box"/>
  <text x="60" y="110" class="label">栈 Stack</text>
  <rect x="65" y="122" width="160" height="70" rx="6" class="card"/>
  <text x="75" y="142" class="code">String</text>
  <text x="75" y="162" class="label">len: 11</text>
  <text x="75" y="182" class="label">cap: 11</text>
  <rect x="415" y="85" width="260" height="120" rx="10" class="highlight"/>
  <text x="430" y="110" class="label">堆 Heap（拥有所有权）</text>
  <text x="430" y="145" class="code">"hello world"</text>
  <line x1="225" y1="157" x2="410" y2="145" class="arrow"/>
  <rect x="45" y="240" width="260" height="100" rx="10" class="box2"/>
  <text x="60" y="265" class="label">栈上的 &amp;str（借用）</text>
  <rect x="65" y="278" width="160" height="50" rx="6" class="card"/>
  <text x="75" y="298" class="code">&amp;str</text>
  <text x="75" y="316" class="label">len: 5</text>
  <rect x="415" y="240" width="260" height="100" rx="10" class="box2"/>
  <text x="430" y="265" class="label">字符串数据（不拥有，只借用）</text>
  <text x="430" y="300" class="code">"hello"</text>
  <line x1="225" y1="303" x2="410" y2="290" class="arrow"/>
  <text x="360" y="372" text-anchor="middle" class="label">String 拥有堆上的数据并可增长，&amp;str 只是借用一段已有字符</text>
</svg>
