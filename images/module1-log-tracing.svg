  </defs>
  <rect x="40" y="56" width="560" height="282" fill="#fff3e0" stroke="#d4a76a" stroke-width="2" rx="8"/>
  <text x="320" y="86" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">日志分层架构</text>
