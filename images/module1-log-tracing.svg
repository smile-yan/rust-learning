  <text x="320" y="172" font-size="12" fill="#666" text-anchor="middle">Filter / Level</text>
  <text x="320" y="188" font-size="12" fill="#666" text-anchor="middle">Record 结构</text>
  <line x1="320" y1="195" x2="320" y2="232" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
