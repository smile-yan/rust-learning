  <text x="120" y="155" font-size="12" fill="#666" text-anchor="middle">log::info!</text>
  <text x="120" y="170" font-size="12" fill="#666" text-anchor="middle">tracing::span!</text>
  <line x1="180" y1="142" x2="240" y2="142" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="250" y="110" width="140" height="85" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/>
  <text x="320" y="135" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">log / tracing</text>
