<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">日志系统 log / tracing</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs>
  <rect x="40" y="55" width="560" height="250" fill="#fff3e0" stroke="#d4a76a" stroke-width="2" rx="8"/>
  <text x="320" y="85" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">日志分层架构</text>
  <rect x="80" y="110" width="120" height="65" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="140" y="135" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">应用代码</text>
  <text x="140" y="155" font-size="12" fill="#666" text-anchor="middle">log::info!</text>
  <text x="140" y="170" font-size="12" fill="#666" text-anchor="middle">tracing::span!</text>
  <line x1="200" y1="142" x2="250" y2="142" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="260" y="100" width="140" height="85" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/>
  <text x="330" y="130" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">log / tracing</text>
  <text x="330" y="150" font-size="12" fill="#666" text-anchor="middle">Facade 层</text>
  <text x="330" y="165" font-size="12" fill="#666" text-anchor="middle">Filter / Level</text>
  <text x="330" y="180" font-size="12" fill="#666" text-anchor="middle">Record 结构</text>
  <line x1="330" y1="185" x2="330" y2="215" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="180" y="220" width="300" height="55" fill="#fce4ec" stroke="#ec407a" stroke-width="2" rx="8"/>
  <text x="330" y="245" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">Subscriber 实现</text>
  <text x="330" y="265" font-size="12" fill="#666" text-anchor="middle">env_logger · tracing_subscriber · 自定义格式</text>
  <line x1="400" y1="142" x2="450" y2="142" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="460" y="110" width="130" height="65" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="525" y="135" font-size="13" font-weight="bold" fill="#3d3229" text-anchor="middle">输出目标</text>
  <text x="525" y="155" font-size="12" fill="#666" text-anchor="middle">终端 / 文件</text>
  <text x="525" y="170" font-size="12" fill="#666" text-anchor="middle">JSON / syslog</text>
  <text x="320" y="318" font-size="13" fill="#5c4b37" text-anchor="middle">log 是轻量 Facade，tracing 是结构化可观测方案</text>
</svg>
