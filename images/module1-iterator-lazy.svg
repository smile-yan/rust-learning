<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">迭代器：惰性求值链</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs><rect x="60" y="150" width="100" height="80" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/><text x="110" y="185" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">vec!</text><text x="110" y="210" font-size="11" font-weight="normal" fill="#3d3229" text-anchor="middle">[1,2,3,4,5]</text><rect x="170" y="150" width="95" height="80" fill="#fff3e0" stroke="#fb8c00" stroke-width="2" rx="8"/><text x="217" y="190" font-size="11" font-weight="bold" fill="#3d3229" text-anchor="middle">iter()</text><rect x="275" y="150" width="95" height="80" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/><text x="322" y="190" font-size="11" font-weight="bold" fill="#3d3229" text-anchor="middle">map(|x| x*x)</text><line x1="265" y1="190" x2="275" y2="190" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/><rect x="380" y="150" width="95" height="80" fill="#f3e5f5" stroke="#ab47bc" stroke-width="2" rx="8"/><text x="427" y="190" font-size="11" font-weight="bold" fill="#3d3229" text-anchor="middle">filter(|x| *x&gt;5)</text><line x1="370" y1="190" x2="380" y2="190" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/><rect x="485" y="150" width="95" height="80" fill="#ffebee" stroke="#ef5350" stroke-width="2" rx="8"/><text x="532" y="190" font-size="11" font-weight="bold" fill="#3d3229" text-anchor="middle">sum()</text><line x1="475" y1="190" x2="485" y2="190" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/><line x1="160" y1="190" x2="170" y2="190" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/><text x="320" y="100" font-size="14" font-weight="normal" fill="#5c4b37" text-anchor="middle">💡 迭代器是惰性的：只有调用 sum() 时才会真正执行</text><text x="320" y="270" font-size="12" font-weight="normal" fill="#666" text-anchor="middle">中间步骤只产生 Iterator 适配器，不分配新集合</text>
</svg>