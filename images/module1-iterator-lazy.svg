<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420">
  <rect width="100%" height="100%" fill="#fff8f0" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3b2a">迭代器：惰性求值链</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4b37"/>
    </marker>
  </defs>
  <rect x="40" y="56" width="560" height="340" fill="#fff3e0" stroke="#d4a76a" stroke-width="2" rx="8"/>
  <text x="320" y="86" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">惰性链：适配器串联，消费时才执行</text>
  <!-- 第一行：vec! → iter() → map() -->
  <rect x="70" y="120" width="130" height="80" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="135" y="155" font-size="14" font-weight="bold" fill="#3d3229" text-anchor="middle">vec!</text>
  <text x="135" y="182" font-size="11" fill="#3d3229" text-anchor="middle">[1,2,3,4,5]</text>
  <line x1="200" y1="160" x2="255" y2="160" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="255" y="120" width="130" height="80" fill="#fff3e0" stroke="#fb8c00" stroke-width="2" rx="8"/>
  <text x="320" y="160" font-size="12" font-weight="bold" fill="#3d3229" text-anchor="middle">iter()</text>
  <text x="320" y="182" font-size="11" fill="#666" text-anchor="middle">借用迭代</text>
  <line x1="385" y1="160" x2="440" y2="160" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="440" y="120" width="130" height="80" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2" rx="8"/>
  <text x="505" y="160" font-size="12" font-weight="bold" fill="#3d3229" text-anchor="middle">map(|x| x*x)</text>
  <text x="505" y="182" font-size="11" fill="#666" text-anchor="middle">惰性变换</text>
  <!-- 换行连接：从 map 底部绕到 filter 顶部 -->
  <path d="M 505 200 L 505 232 L 135 232 L 135 270" fill="none" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 第二行：filter() → sum() -->
  <rect x="70" y="280" width="130" height="80" fill="#f3e5f5" stroke="#ab47bc" stroke-width="2" rx="8"/>
  <text x="135" y="320" font-size="12" font-weight="bold" fill="#3d3229" text-anchor="middle">filter(|x| *x&gt;5)</text>
  <text x="135" y="342" font-size="11" fill="#666" text-anchor="middle">惰性过滤</text>
  <line x1="200" y1="320" x2="255" y2="320" stroke="#5c4b37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="255" y="280" width="130" height="80" fill="#ffebee" stroke="#ef5350" stroke-width="2" rx="8"/>
  <text x="320" y="320" font-size="12" font-weight="bold" fill="#3d3229" text-anchor="middle">sum()</text>
  <text x="320" y="342" font-size="11" fill="#666" text-anchor="middle">消费触发执行</text>
  <text x="320" y="385" font-size="12" fill="#5c4b37" text-anchor="middle">中间步骤只产生 Iterator 适配器，不分配新集合</text>
</svg>